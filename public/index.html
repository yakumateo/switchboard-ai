<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>SwitchBoard AI - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen p-4 md:p-10">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">

        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 h-fit">
            <h1 class="text-3xl font-bold mb-6 text-cyan-400 flex items-center gap-2">
                <span>🚀</span> SwitchBoard AI
            </h1>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-400">¿Qué necesitas agendar?</label>
                    <textarea id="prompt"
                        class="w-full p-3 rounded bg-slate-700 border border-slate-600 focus:ring-2 focus:ring-cyan-500 outline-none h-32 transition-all"
                        placeholder="Ej: Recuérdame el partido en 10 minutos..."></textarea>
                </div>

                <button onclick="enviar()" id="btnEnviar"
                    class="w-full bg-cyan-600 hover:bg-cyan-500 transition-all py-3 rounded-lg font-bold text-lg shadow-lg active:scale-95">
                    Enviar Orden
                </button>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                <h2 class="text-xl font-bold mb-4 text-orange-400 flex items-center gap-2">
                    <span>⏳</span> Próximas (Delayed)
                </h2>
                <div id="listaPendientes" class="space-y-3"></div>
            </div>

            <div id="seccionVencidas"
                class="bg-slate-800/80 p-6 rounded-2xl border-2 border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.2)] hidden">
                <h2 class="text-xl font-bold mb-4 text-red-400 flex items-center gap-2">
                    <span>🚨</span> ¡Por Confirmar!
                </h2>
                <div id="listaVencidas" class="space-y-3">
                </div>
            </div>

            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                <h2 class="text-xl font-bold mb-4 text-emerald-400 flex items-center gap-2">
                    <span>✅</span> Recientes (Completed)
                </h2>
                <div id="listaCompletadas" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. Configuración de Notificaciones y Audio
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        let tareasVistas = new Set();
        let notificacionesLanzadas = new Set();

        // 2. Función para ENVIAR
        async function enviar() {
            const promptInput = document.getElementById('prompt');
            const prompt = promptInput.value;
            const btn = document.getElementById('btnEnviar');

            if (!prompt.trim()) return alert("Escribe un mensaje");

            btn.innerText = "🤖 IA Pensando...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/agendar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                if (res.ok) {
                    promptInput.value = "";
                    actualizarListas();
                }
            } catch (error) {
                console.error("Error al enviar:", error);
            } finally {
                btn.innerText = "Enviar Orden";
                btn.disabled = false;
            }
        }

        // 3. Función principal de ACTUALIZAR LISTAS
        async function actualizarListas() {
            try {
                const res = await fetch('/api/tareas');
                const data = await res.json();

                // --- A. PRÓXIMAS (DELAYED) ---
                const listP = document.getElementById('listaPendientes');
                listP.innerHTML = data.proximas.length ? '' : '<p class="text-slate-500 italic text-sm">Nada pendiente.</p>';
                data.proximas.forEach(t => {
                    listP.innerHTML += `
                    <div class="bg-slate-700/50 p-3 rounded-lg border-l-4 border-orange-500 flex justify-between items-center opacity-80">
                        <div>
                            <p class="text-sm font-medium">"${t.prompt}"</p>
                            <p class="text-[10px] text-slate-400">📅 ${t.correEn}</p>
                        </div>
                        <button onclick="eliminarTarea('${t.id}')" class="hover:text-red-400 transition-colors">🗑️</button>
                    </div>`;
                });

                // --- B. VENCIDAS (ACTIVE / POR CONFIRMAR) ---
                const seccionV = document.getElementById('seccionVencidas');
                const listV = document.getElementById('listaVencidas');

                if (data.vencidas && data.vencidas.length > 0) {
                    seccionV.classList.remove('hidden');
                    listV.innerHTML = '';
                    data.vencidas.forEach(t => {
                        // Notificar solo una vez cuando pase a vencida
                        if (!notificacionesLanzadas.has(t.id)) {
                            lanzarNotificacion(t.prompt);
                            notificacionesLanzadas.add(t.id);
                        }

                        listV.innerHTML += `
                        <div class="bg-red-900/20 p-4 rounded-xl border border-red-500/50 flex flex-col gap-3 animate-pulse">
                            <p class="text-sm font-semibold text-red-100">"${t.prompt}"</p>
                            <div class="flex gap-2">
                                <button onclick="confirmarTarea('${t.id}')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-xs py-2 rounded-lg font-bold transition-all">
                                    Marcar como Hecho ✅
                                </button>
                                <button onclick="eliminarTarea('${t.id}')" class="bg-slate-800 hover:bg-red-600 px-3 py-2 rounded-lg transition-all text-xs">
                                    🗑️
                                </button>
                            </div>
                        </div>`;
                    });
                } else {
                    seccionV.classList.add('hidden');
                }

                // --- C. HISTORIAL (COMPLETED) ---
                const listC = document.getElementById('listaCompletadas');
                listC.innerHTML = data.historial.length ? '' : '<p class="text-slate-500 italic text-sm">Historial vacío.</p>';
                data.historial.forEach(t => {
                    listC.innerHTML += `
                    <div class="bg-slate-700/30 p-3 rounded-lg border-l-4 border-emerald-500/50 flex justify-between items-center opacity-60">
                        <p class="text-xs">"${t.prompt}"</p>
                        <span class="text-[9px] text-emerald-500 font-bold">COMPLETADO</span>
                    </div>`;
                });

            } catch (e) { console.error("Error de polling", e); }
        }

        // 4. ACCIONES (CONFIRMAR / ELIMINAR)
        async function confirmarTarea(id) {
            const res = await fetch(`/api/tareas/${id}/completar`, { method: 'POST' });
            if (res.ok) {
                actualizarListas();
            }
        }

        async function eliminarTarea(id) {
            if (confirm("¿Eliminar esta tarea?")) {
                await fetch(`/api/tareas/${id}`, { method: 'DELETE' });
                actualizarListas();
            }
        }

        function lanzarNotificacion(mensaje) {
            if (Notification.permission === "granted") {
                new Notification("🚨 Tarea Pendiente", {
                    body: `¡Es hora de: ${mensaje}!`,
                    icon: "https://cdn-icons-png.flaticon.com/512/179/179386.png"
                });
                const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');
                audio.play().catch(e => console.log("Audio bloqueado hasta interacción"));
            }
        }

        setInterval(actualizarListas, 3000);
        actualizarListas();
    </script>
</body>

</html>
