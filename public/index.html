<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>SwitchBoard AI - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen p-4 md:p-10">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">

        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 h-fit">
            <h1 class="text-3xl font-bold mb-6 text-cyan-400 flex items-center gap-2">
                <span>🚀</span> SwitchBoard AI
            </h1>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-400">¿Qué necesitas agendar?</label>
                    <textarea id="prompt"
                        class="w-full p-3 rounded bg-slate-700 border border-slate-600 focus:ring-2 focus:ring-cyan-500 outline-none h-32 transition-all"
                        placeholder="Ej: Recuérdame el partido en 10 minutos..."></textarea>
                </div>

                <button onclick="enviar()" id="btnEnviar"
                    class="w-full bg-cyan-600 hover:bg-cyan-500 transition-all py-3 rounded-lg font-bold text-lg shadow-lg active:scale-95">
                    Enviar Orden
                </button>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                <h2 class="text-xl font-bold mb-4 text-orange-400 flex items-center gap-2">
                    <span>⏳</span> Próximas (Delayed)
                </h2>
                <div id="listaPendientes" class="space-y-3"></div>
            </div>

            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                <h2 class="text-xl font-bold mb-4 text-emerald-400 flex items-center gap-2">
                    <span>✅</span> Recientes (Completed)
                </h2>
                <div id="listaCompletadas" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. Configuración de Notificaciones
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        let tareasVistas = new Set();

        // 2. Función para ENVIAR (La que te faltaba)
        async function enviar() {
            const promptInput = document.getElementById('prompt');
            const prompt = promptInput.value;
            const btn = document.getElementById('btnEnviar');

            if (!prompt.trim()) return alert("Escribe un mensaje");

            btn.innerText = "🤖 IA Pensando...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/agendar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                if (res.ok) {
                    promptInput.value = "";
                    actualizarListas();
                }
            } catch (error) {
                console.error("Error al enviar:", error);
            } finally {
                btn.innerText = "Enviar Orden";
                btn.disabled = false;
            }
        }

        // 3. Función para ACTUALIZAR LISTAS
        async function actualizarListas() {
            try {
                const res = await fetch('/api/tareas');
                const data = await res.json();

                const listP = document.getElementById('listaPendientes');
                listP.innerHTML = data.proximas.length ? '' : '<p class="text-slate-500 italic text-sm">Nada pendiente.</p>';
                data.proximas.forEach(t => {
                    listP.innerHTML += `
                        <div class="bg-slate-700/50 p-3 rounded-lg border-l-4 border-orange-500 flex justify-between items-center">
                            <div>
                                <p class="text-sm font-medium">"${t.prompt}"</p>
                                <p class="text-xs text-slate-400">📅 ${t.correEn}</p>
                            </div>
                            <button onclick="eliminarTarea('${t.id}')" class="hover:text-red-400 transition-colors">🗑️</button>
                        </div>`;
                });

                const listC = document.getElementById('listaCompletadas');
                listC.innerHTML = data.historial.length ? '' : '<p class="text-slate-500 italic text-sm">Historial vacío.</p>';
                data.historial.forEach(t => {
                    if (!tareasVistas.has(t.id)) {
                        lanzarNotificacion(t.prompt);
                        tareasVistas.add(t.id);
                    }
                    listC.innerHTML += `
                        <div class="bg-slate-700/50 p-3 rounded-lg border-l-4 border-emerald-500 opacity-70">
                            <p class="text-sm">"${t.prompt}"</p>
                            <p class="text-[10px] text-emerald-400">FINALIZADO</p>
                        </div>`;
                });
            } catch (e) { console.error("Error de polling", e); }
        }

        // 4. ELIMINAR Y NOTIFICAR
        async function eliminarTarea(id) {
            if (confirm("¿Cancelar tarea?")) {
                await fetch(`/api/tareas/${id}`, { method: 'DELETE' });
                actualizarListas();
            }
        }

        function lanzarNotificacion(mensaje) {
            if (Notification.permission === "granted") {
                new Notification("🚀 Tarea Completada", { body: mensaje });
                new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3').play();
            }
        }

        setInterval(actualizarListas, 3000);
        actualizarListas();
    </script>
</body>

</html>
